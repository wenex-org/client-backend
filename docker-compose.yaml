version: '3.8'

x-common: &common
  build:
    context: .
  env_file:
    - .env
  networks:
    - client

services:
  #######################
  # CLIENT SERVICES
  #######################
  client:
    build:
      args:
        SERVICE_NAME: gateway
    ports:
      - '8000:8000' # REST
    environment:
      NODE_ENV: prod
    <<: *common

  #######################
  # CRAFTS SERVICES
  #######################
  crafts:
    build:
      args:
        SERVICE_NAME: services
    ports:
      - '8001:8001' # REST
    environment:
      NODE_ENV: prod
    <<: *common

networks:
  client:
    driver: bridge
